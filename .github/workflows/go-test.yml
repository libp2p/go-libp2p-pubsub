name: Go Test

on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    uses: Marcopolo/unified-github-workflows/.github/workflows/go-test.yml@555b0253836d8ec317d0f7f911d10529bf275b7d
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
